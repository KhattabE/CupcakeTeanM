<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link rel="stylesheet" href="/css/signupStyle.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="/js/features.js"></script>
</head>
<body>

<div class="topbar">
    <button onclick="goBack()" class="backBtn">← Back</button>
    <div id="info">
        <a href="#about" class="infoTextLeft">About</a>
        <a href="#contact" class="infoTextLeft">Contact</a>
    </div>
    <div id="frontsideheader">
        <h2>Design your own cupcake 🧁</h2>
    </div>
    <div id="signinfo">
        <a href="/signup" class="infoTextRight">Sign up</a>
        <a href="/signin" class="infoTextRight">Sign in</a>
    </div>
</div>

    <div class="signupBox">
        <div id="createUserText">
            <h1>Create User</h1>
        </div>

        <form class="signup-form" method="post" action="/signup">

            <div id="signupMail">
                <input type="email" id="email" name="email" placeholder="Mail" required>
            </div>


            <div id="signupPassword">
                <input type="password" id="password"  name="password" placeholder="Password" required>
            </div>

            <div id="signupConfirmPassword">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat Password" required>
            </div>
            <hr id="boxline">

            <div id="signupFirstName">
                <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
            </div>

            <div id="signupLastName">
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
            </div>


            <div id="signupButton">
                <button type="submit" value="Sign Up">Sign up</button>
            </div>

        </form>

</div>

</body>
</html>
