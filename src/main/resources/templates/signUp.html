<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link rel="stylesheet" href="/css/signupStyle.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="headerbox">

    <h1>
        <a href="/" class="headerTitleLink">The Cupcake Co. 🧁</a>
    </h1>

</div>

    <div class="signupBox">
        <div id="createUserText">
            <h1>Create User</h1>
        </div>

        <form class="signup-form" method="post" action="/signup">

            <div id="signupMail">
                <input type="email" id="email" name="email" placeholder="Mail" required>
            </div>


            <div id="signupPassword">
                <input type="password" id="password"  name="password" placeholder="Password" required>
            </div>

            <div id="signupConfirmPassword">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat Password" required>
            </div>
            <hr id="boxline">

            <div id="signupFirstName">
                <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
            </div>

            <div id="signupLastName">
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
            </div>


            <div id="signupButton">
                <button type="submit" value="Sign Up">Sign up</button>
            </div>

        </form>

</div>

</body>
</html>
