<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="../public/images/cupcakelogo.png">
        <h1>Sign up to design your cupcake 🧁</h1>
    </div>

    <div class="signup-card">

        <form class="signup-form">

                <label for="email">Email</label>
                <input type="email" id="email" name="userEmail" placeholder="Email">

                <label for="password">Password</label>
                <input type="password" id="password"  name="userPassword" placeholder="Password">

                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat Password">

                 <button type="submit">Sign up</button>
        </form>

        </div>

</div>

</body>
</html>
