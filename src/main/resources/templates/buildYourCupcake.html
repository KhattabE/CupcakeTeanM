<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Cupcake Co.</title>
    <link rel="stylesheet" href="/css/buildYourOwnCupcake.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
    <a href="#">Order cupcakes here</a>
</div>

<div class="pagewrapper">

    <div class="headerbox">
        <div id="saldoBox">
            <span id="saldoText">Saldo:</span>
            <div id="saldoAmount">
                <span th:text="${currentUser != null ? #numbers.formatDecimal(currentUser.balance, 1, 2) + ' kr.' : '0.00 kr.'}">
                    198.99 kr.
                </span>
            </div>
        </div>

        <h1>The Cupcake Co. 🧁</h1>

        <div id="profileBox">
            <a href="#"
               th:text="${currentUser != null ? 'Profile (' + currentUser.email + ')' : 'Profile'}">
                Profile (mail@gmail.com)
            </a>
            <span>/</span>
            <a href="/basket">Basket</a>
        </div>
    </div>

    <div class="mainobjectbox">

        <div id="builderTitleBox">
            Build your cupcake 🧁
        </div>

        <form method="post" action="/basket/add">

            <div class="sectionbox">
                <div class="sectiontitle">Choose topping</div>

                <div class="sectioncontent">

                    <label class="card" th:each="top, stat : ${toppings}">
                        <input type="radio"
                               name="topping"
                               th:value="${top.cupcakeTopId}"
                               th:attr="data-price=${top.price}"
                               th:checked="${stat.first}">
                        <div class="cardHeader">
                            <span class="cardName" th:text="${top.topping}">Chocolate</span>
                            <span class="customRadio"></span>
                        </div>

                        <img th:if="${top.topping == 'Chocolate'}" src="/images/CocoTop.png" alt="Chocolate topping">
                        <img th:if="${top.topping == 'Vanilla'}" src="/images/VanilaTop.png" alt="Vanilla topping">
                        <img th:if="${top.topping == 'Nutmeg'}" src="/images/NutsTop.png" alt="Nutmeg topping">
                        <img th:if="${top.topping == 'Pistacio'}" src="/images/PestTop.png" alt="Pistachio topping">
                        <img th:if="${top.topping == 'Strawberry'}" src="/images/StrawBerryTop.png" alt="Strawberry topping">

                        <span class="price" th:text="${top.price + 'kr'}">15kr</span>
                    </label>

                </div>
            </div>

            <div class="sectionbox">
                <div class="sectiontitle">Choose bottom</div>

                <div class="sectioncontent">

                    <label class="card" th:each="bottomChoice, stat : ${bottoms}">
                        <input type="radio"
                               name="bottom"
                               th:value="${bottomChoice.cupcakeBottomId}"
                               th:attr="data-price=${bottomChoice.price}"
                               th:checked="${stat.first}">
                        <div class="cardHeader">
                            <span class="cardName" th:text="${bottomChoice.bottom}">Chocolate</span>
                            <span class="customRadio"></span>
                        </div>

                        <img th:if="${bottomChoice.bottom == 'Chocolate'}" src="/images/CocoBottom.png" alt="Chocolate bottom">
                        <img th:if="${bottomChoice.bottom == 'Vanilla'}" src="/images/BottomOne.png" alt="Vanilla bottom">
                        <img th:if="${bottomChoice.bottom == 'Nutmeg'}" src="/images/BottomTwo.png" alt="Nutmeg bottom">
                        <img th:if="${bottomChoice.bottom == 'Pistacio'}" src="/images/BottomThree.png" alt="Pistacio bottom">
                        <img th:if="${bottomChoice.bottom == 'Almond'}" src="/images/BottomFour.png" alt="Almond bottom">

                        <span class="price" th:text="${bottomChoice.price + 'kr'}">10kr</span>
                    </label>

                </div>
            </div>

            <div class="bottomBar">

                <div class="quantityBox">
                    <span class="quantityLabel">Quantity:</span>

                    <div class="quantityControl">
                        <button type="button" class="quantityButton" id="minusButton">-</button>
                        <input type="number" name="quantity" value="1" min="1" class="quantityInput" id="quantityInput">
                        <button type="button" class="quantityButton" id="plusButton">+</button>
                    </div>
                </div>

                <div class="priceDisplay">
                    <span id="totalPrice">Price: 0 kr</span>
                </div>

                <button type="submit" class="basketButton">Add to basket</button>

            </div>

        </form>

    </div>

</div>

<script src="/js/buildYourOwnCupcake.js"></script>
</body>
</html>
