<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Basket - The Cupcake Co.</title>
    <link rel="stylesheet" href="/css/YourBasket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
    <a href="#">Order cupcakes here</a>
</div>

<div class="pagewrapper">

    <div class="headerbox">
        <div id="saldoBox">
            <span id="saldoText">Saldo:</span>
            <div id="saldoAmount">
                <span th:text="${currentUser.balance} + ' kr.'">199.99 kr.</span>
            </div>
        </div>

        <h1>The Cupcake Co. 🧁</h1>

        <div id="profileBox">
            <a href="#">Profile</a>
            <span>/</span>
            <a href="/basket">Basket</a>
        </div>
    </div>

    <div class="basketMainBox">

        <div id="basketTitleBox">
            Your basket 🧁
        </div>

        <div class="basketItemsBox">

            <div class="basketItemCard" th:each="item, stat : ${basket}">
                <div class="basketItemTopRow">
                    <h2 th:text="${item.quantity} + 'x ' + item.bottom + ' + ' + item.topping + ' topping'">
                        3x Strawberry + chocolate topping
                    </h2>
                    <span class="itemPrice" th:text="${item.quantity * item.unitPrice} + ' kr.'">45 kr.</span>
                </div>

                <hr>

                <div class="basketItemBottomRow">
                    <div class="basketImageBox">
                        <img src="/images/ThreeCupcake.png" alt="Cupcakes">
                    </div>

                    <form method="post" action="/basket/remove">
                        <input type="hidden" name="index" th:value="${stat.index}">
                        <button type="submit" class="removeButton">Remove</button>
                    </form>

                    <div class="quantityControl">

                        <form method="post" action="/basket/decrease">
                            <input type="hidden" name="index" th:value="${stat.index}">
                            <button type="submit" class="quantityButton">-</button>
                        </form>

                        <input type="number" th:value="${item.quantity}" min="1" class="quantityInput" readonly>

                        <form method="post" action="/basket/increase">
                            <input type="hidden" name="index" th:value="${stat.index}">
                            <button type="submit" class="quantityButton">+</button>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="summaryBox">
        <div class="summaryTopRow">
            <div class="totalText">
                Total: <span th:text="${total} + ' kr.'">179,00 kr.</span>
            </div>

            <div class="pickupWrapper">
                <label for="pickupDate">Pickup date:</label>
                <select id="pickupDate" name="pickupDate" form="confirmForm">
                    <option selected value="13 april">13 april</option>
                    <option value="14 april">14 april</option>
                    <option value="15 april">15 april</option>
                </select>
            </div>
        </div>

        <hr>

        <div class="confirmButtonWrapper">
            <form method="post" action="/basket/confirm" id="confirmForm">
                <button type="submit" class="confirmButton">Confirm</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
