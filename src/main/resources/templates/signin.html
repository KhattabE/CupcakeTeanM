<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" href="/css/signinStyle.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
    <div id="info">
        <a href="#about" class="infoTextLeft">About</a>
        <a href="#contact" class="infoTextLeft">Contact</a>
    </div>
    <div id="frontsideheader">
        <h2>Design your own cupcake 🧁</h2>
    </div>
    <div id="signinfo">
        <a href="/signup" class="infoTextRight">Sign up</a>
        <a href="/signin" class="infoTextRight">Sign in</a>
    </div>
</div>

<div class="signinBox">

    <div id="cupcakelogo">
        <img src="/images/cupcakelogo.png" alt="logo">
        <hr id="boxline">
    </div>


    <form method="post" action="/signin">

        <div id="signinMail">
            <input type="email" name="email" placeholder="Mail" required>
        </div>

        <div id="signinPassword">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <a href="#" id="forgotPassword">Forgot password</a>

        <div id="signinButton">
            <button type="submit">Login</button>
        </div>

    </form>

</div>

</body>
</html>
