<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile</title>
    <link rel="stylesheet" href="/css/AdminUIProfile.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="pagewrapper">
    <div class="topbar">
        <div class="adminBadge">Admin</div>

        <h1>
            <a href="/menu" class="headerTitleLink">The Cupcake Co. 🧁</a>
        </h1>

        <div class="profilePreview">
            <a href="/admin-profile"
               th:text="${currentUser != null ? 'Profile (' + currentUser.email + ')' : 'Profile'}">
                Profile (Admin@gmail.com)
            </a>
        </div>
    </div>

    <div class="contentwrapper">
        <div class="mainobjectbox">
            <h2 id="myProfileText">My profile</h2>

            <hr class="boxline">

            <div class="infoRow">
                <span class="profileInfoText">Name:</span>
                <span class="profileInfoValueText"
                      th:text="${currentUser.firstName + ' ' + currentUser.lastName}">
                    Admin
                </span>
            </div>

            <hr class="boxline">

            <div class="infoRow">
                <span class="profileInfoText">Email:</span>
                <span class="profileInfoValueText"
                      th:text="${currentUser.email}">
                    admin@gmail.com
                </span>
            </div>

            <hr class="boxline">

            <div class="infoRow">
                <span class="profileInfoText">Role:</span>
                <span class="profileInfoValueText"
                      th:text="${currentUser.role}">
                    Administrator
                </span>
            </div>

            <hr class="boxline">

            <div class="profileActions">
                <button type="button" class="actionButton logoutButton" onclick="window.location.href='/logout'">
                    Log out
                </button>
            </div>
        </div>

        <div class="adminUIBar">
            <h2 class="panelTitle">Admin UI</h2>

            <hr class="boxline">

            <h3 class="adminFeaturesText">Admin features</h3>

            <div class="adminFeatureList">
                <a href="/view-all-users" class="adminLink">
                    <div class="adminActionButton">View all users</div>
                </a>

                <a href="/view-all-orders" class="adminLink">
                    <div class="adminActionButton">View all orders</div>
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
