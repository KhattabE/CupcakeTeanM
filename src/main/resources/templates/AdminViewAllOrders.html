<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin UI - Orders</title>
  <link rel="stylesheet" href="/css/AdminViewAllOrders.css">
</head>
<body>

<div class="page-wrapper">

  <header class="topbar">
    <div class="admin-badge">Admin</div>

    <h1 class="logo-title">
      <a href="/admin-profile" class="headerTitleLink">The Cupcake Co. 🧁</a>
    </h1>




    <div class="profile">
      Profile (
      <span th:text="${currentUser.email}">admin@gmail.com</span>
      )
    </div>
  </header>

  <main class="admin-panel">
    <h2>Admin UI</h2>
    <div class="boxline"></div>

    <section class="orders-list">

      <div th:if="${#lists.isEmpty(orders)}">
        <p style="color: white; text-align:center;">No orders found</p>
      </div>

      <div class="order-card" th:each="order : ${orders}">

        <div class="order-info">
          <h3 th:text="'Order #' + ${order.orderId}">Order #1</h3>
          <p th:text="'User ID: ' + ${order.userId}">User ID: 1</p>
          <p th:text="'Pickup: ' + ${order.pickup}">Pickup</p>
        </div>

        <div class="order-status"
             th:classappend="${#strings.equalsIgnoreCase(order.status, 'Completed')} ? ' completed' : ' in-process'">
    <span th:text="${#strings.equalsIgnoreCase(order.status, 'Completed')} ? 'Completed 🟢' : 'In process 🟡'">
        In process 🟡
    </span>
        </div>

        <form th:action="@{/admin/delete-order}" method="post">
          <input type="hidden" name="orderId" th:value="${order.orderId}">
          <button type="submit" class="delete-btn">Delete</button>
        </form>

      </div>

    </section>
  </main>

</div>

</body>
</html>
